substances:
  mulungu:
    name: Mulungu
    de_name: Mulungu
    category: herbal_adaptogen
    source_plant: Erythrina mulungu
    common_names:
      - Red Coral Tree
      - Brazilian Red Tree
    description: Traditional Brazilian ethnobotanical, used for stress, anxiety, and sleep
    references:
      - erysotrine
      - erysovine
      - erysodine
      - quercetin
      - kaempferol
    traditional_use:
      - Stress relief
      - Anxiety reduction
      - Sleep support
      - Calming agent
    relaxation_relevance: high_positive
    mechanism: "Phytocomplex: contains alkaloids (erysotrine, erysovine) + flavonoids (quercetin, kaempferol); synergistic anxiolytic + GABA-modulating effects"
    notes: "Traditional use backed by ethnobotany; specific alkaloid mechanisms under research"

  ashwagandha:
    name: Ashwagandha (Withania somnifera)
    de_name: Ashwagandha
    category: herbal_adaptogen
    source_plant: Withania somnifera
    common_names:
      - Indian Ginseng
      - Winter Cherry
    description: Ayurvedic adaptogen for stress resilience and cortisol regulation
    references:
      - withaferin_a
      - withanolide_d
      - withanolide_a
    traditional_use:
      - Stress management
      - Sleep enhancement
      - Immune support
      - Energy stabilization
    relaxation_relevance: high_positive
    mechanism: "Withanolides inhibit cortisol release; synergistic effects with GABA and serotonin pathways"
    notes: "Well-researched adaptogen; clinical evidence for 28-30% cortisol reduction over 8 weeks"

  green_tea:
    name: Green Tea
    de_name: Grüner Tee
    category: herbal_beverage
    source_plant: Camellia sinensis
    description: Brewed tea containing L-theanine, caffeine, and catechin polyphenols
    references:
      - l_theanine
      - caffeine
      - egcg
      - theobromine
    traditional_use:
      - Relaxation with mild alertness
      - Antioxidant support
      - Mood enhancement
    relaxation_relevance: moderate_positive
    mechanism: "Synergistic: L-theanine smooths caffeine's effects; EGCG provides anti-inflammatory + antioxidant benefits"
    notes: "Balanced caffeine-theanine ratio (natural ~1:2 or 1:3)"

  magnesium_glycinate:
    name: Magnesium Glycinate
    de_name: Magnesium-Glycinat
    category: mineral_supplement
    description: Chelated magnesium form with enhanced bioavailability and GI tolerance
    references:
      - magnesium
      - glycine
    traditional_use:
      - Sleep support
      - Muscle relaxation
      - Anxiety reduction
      - Digestive ease
    relaxation_relevance: high_positive
    mechanism: "Magnesium potentiates GABA; glycine enhances sleep quality; superior absorption vs oxide/carbonate forms"
    notes: "Preferred form for sleep: glycine + magnesium synergy; minimal laxative effect"

  passionflower:
    name: Passionflower (Passiflora edulis)
    de_name: Passionsblume
    category: herbal_anxiolytic
    source_plant: Passiflora edulis / incarnata
    description: Traditional anxiolytic herb used in European phytomedicine
    references:
      - flavonoid_vitexin
      - alkaloid_harmaline
      - gaba
    traditional_use:
      - Anxiety reduction
      - Sleep support
      - Nervous tension relief
    relaxation_relevance: high_positive
    mechanism: "GABA potentiation + MAO inhibition (harmala alkaloids); synergistic anxiolytic"
    notes: "Often combined with valerian in sleep formulas"

  chamomile_tea:
    name: Chamomile Tea (Matricaria recutita)
    de_name: Kamillentee
    category: herbal_beverage
    source_plant: Matricaria recutita
    description: Mild herbal infusion for relaxation and digestive ease
    references:
      - apigenin
      - flavonoid_derivatives
      - gaba
    traditional_use:
      - Relaxation before bed
      - Digestive support
      - Gentle anxiety relief
    relaxation_relevance: moderate_positive
    mechanism: "Apigenin (benzodiazepine-like) binds GABA-A receptors weakly; traditional safety profile"
    notes: "Mild effect; suitable for daily use; pairs well with bedtime routine"

  lavender:
    name: Lavender (Lavandula angustifolia)
    de_name: Lavendel
    category: herbal_anxiolytic
    source_plant: Lavandula angustifolia
    description: Aromatic herb and essential oil for relaxation and sleep
    references:
      - linalool
      - linalyl_acetate
      - geraniol
    traditional_use:
      - Anxiety reduction
      - Sleep enhancement
      - Relaxation inhalation
    relaxation_relevance: high_positive
    mechanism: "Terpenes (linalool, linalyl acetate) modulate GABA and serotonin; aroma activates olfactory relaxation pathways"
    notes: "Effective both as inhalation (essential oil) and ingestion (tea/extract)"

  lemon_balm_tea:
    name: Lemon Balm Tea (Melissa officinalis)
    de_name: Zitronenmelisse-Tee
    category: herbal_beverage
    source_plant: Melissa officinalis
    description: Mild herbal tea for gentle relaxation and digestion support
    references:
      - rosmarinic_acid
      - caffeic_acid
      - gaba
    traditional_use:
      - Mild anxiety reduction
      - Digestion support
      - Gentle relaxation
    relaxation_relevance: moderate_positive
    mechanism: "GABA potentiation; rosmarinic acid provides anti-inflammatory + antioxidant support"
    notes: "Gentle, suitable for daily afternoon use; pairs well with afternoon wind-down"

  rhodiola:
    name: Rhodiola rosea
    de_name: Rhodiola
    category: herbal_adaptogen
    source_plant: Rhodiola rosea
    description: Nordic adaptogen for fatigue resistance and mood support
    references:
      - salidroside
      - rosavin
    traditional_use:
      - Fatigue resistance
      - Mood enhancement
      - Stress resilience
    relaxation_relevance: moderate_positive
    mechanism: "Salidroside modulates monoamine neurotransmitters; enhances dopamine in fatigue states without overstimulation"
    notes: "Morning/early afternoon use; synergistic with exercise for stress resilience"

  glycine_supplement:
    name: Glycine Supplement
    de_name: Glycin-Supplement
    category: amino_acid_supplement
    description: Simple amino acid for sleep quality and collagen synthesis
    references:
      - glycine
    traditional_use:
      - Sleep quality enhancement
      - Collagen support
      - CNS relaxation
    relaxation_relevance: high_positive
    mechanism: "Glycine (inhibitory neurotransmitter) promotes parasympathetic tone; lowers core body temperature for sleep"
    notes: "3-5g evening dose; synergistic with magnesium for sleep support"

  tongkat_ali:
    name: Tongkat Ali (Eurycoma longifolia)
    de_name: Tongkat Ali
    category: herbal_adaptogen
    source_plant: Eurycoma longifolia
    common_names:
      - Malaysian Ginseng
      - Longjack
    description: South-East Asian adaptogen for cortisol reduction, testosterone support, and stress resilience
    references:
      - eurycomanone
      - eurypeptides
    traditional_use:
      - Stress resilience
      - Energy and vitality
      - Testosterone support
      - Libido enhancement
    relaxation_relevance: moderate_positive
    mechanism: "Eurycomanone inhibits cortisol and increases free testosterone via LH stimulation; eurypeptides modulate HPA axis stress response"
    notes: "100-200mg standardized extract (2% eurycomanone); morning use preferred; not sedating — reduces allostatic load"
