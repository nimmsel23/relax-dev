# Biochemistry Knowledge Base: Biochemical Reactions & Cascades
# Major physiological processes and their molecular mechanisms
# Last updated: 2026-05-18

reactions:
  # ─── Stress Axis ───
  hpa_axis:
    name: "Hypothalamic-Pituitary-Adrenal Axis"
    de_name: "HPA-Achse"
    description: "Primary stress response system and cortisol regulation"
    category: "stress_response"

    cascade:
      - step: 1
        molecule: "CRH"
        location: "hypothalamus"
        trigger: "stress perception (via amygdala/prefrontal cortex)"
        action: "Release CRH into portal blood"

      - step: 2
        molecule: "ACTH"
        location: "anterior pituitary"
        action: "CRH stimulates ACTH release"
        duration_minutes: 15

      - step: 3
        molecule: "cortisol"
        location: "adrenal cortex (zona fasciculata)"
        action: "ACTH stimulates cortisol synthesis and release"
        peak_time_minutes: 20

      - step: 4
        molecule: "negative_feedback"
        action: "cortisol inhibits CRH and ACTH (negative feedback)"
        notes: "Prevents excessive activation; can be blunted in chronic stress"

    activated_by:
      - acute_stress
      - exercise
      - caffeine
      - poor_sleep
      - inflammation
      - hypoglycemia

    inhibited_by:
      - relaxation_techniques
      - parasympathetic_activation
      - adequate_sleep
      - social_support
      - oxytocin

    typical_duration_minutes: 20
    circadian_rhythm: "peaks_morning, nadir_midnight"
    adaptation: "repeated_acute_stress (eustress) → adaptation; chronic_stress → dysregulation"

  parasympathetic_activation:
    name: "Parasympathetic (Rest-and-Digest) Activation"
    de_name: "Parasympathische Aktivierung"
    description: "Counteracts HPA axis; promotes rest, recovery, digestion"
    category: "relaxation_response"

    pathways:
      - pathway: "Vagal_stimulation"
        mechanism: "vagus_nerve (CN_X) releases_acetylcholine"
        effects:
          - heart_rate_decrease
          - blood_pressure_decrease
          - digestion_increase (parasympathetic_tone → increased_GI_motility)
          - pupils_constrict
          - salivation_increase

      - pathway: "GABA_potentiation"
        mechanism: "slow_breathing → increased_GABA → reduced_amygdala_reactivity"
        effects:
          - anxiety_decrease
          - fear_extinction

      - pathway: "Adenosine_accumulation"
        mechanism: "rest → ATP_depletion → adenosine_accumulation"
        effects:
          - sleep_pressure_increase
          - wakefulness_suppression

    activated_by:
      - deep_breathing (especially_long_exhales)
      - meditation
      - yoga
      - massage
      - warm_bath
      - music
      - cold_water_immersion (brief)
      - social_connection
      - vagal_exercises (gargling, cold_face)

    typical_onset_minutes: 5
    typical_duration_minutes: 30
    recovery_timeline: "24_48h_rest → HPA_axis_normalization"

  sleep_onset_melatonin_synthesis:
    name: "Sleep Onset and Melatonin Synthesis Cascade"
    de_name: "Schlafeinleitung und Melatonin-Synthese"
    description: "Evening circadian signal → melatonin synthesis → sleep onset"
    category: "circadian_rhythm"

    timeline:
      - hour: "afternoon (1700_1800)"
        event: "Light exposure decreases; core body temperature begins decline"
        mechanism: "SCN (suprachiasmatic_nucleus) detects_light_offset"

      - hour: "early_evening (1900_2000)"
        event: "AANAT enzyme activated (phosphorylated)"
        molecule: "serotonin"
        action: "serotonin → N-acetylserotonin (via_AANAT)"
        requirement: "darkness, appropriate_light_spectrum"

      - hour: "evening (2000_2200)"
        event: "Melatonin synthesis accelerates"
        molecule: "melatonin"
        action: "N-acetylserotonin → melatonin (via_ASMT)"
        concentration_rise: "0.5 → 5 pg/mL"

      - hour: "pre_sleep (2100_2300)"
        event: "Sleep propensity increase via melatonin + adenosine"
        mechanism: "melatonin_→_MT1_MT2_receptors → reduced_wakefulness_signals"

      - hour: "night (2300_0600)"
        event: "Deep sleep (melatonin_peak, cortisol_nadir)"
        concentration: "melatonin_peak_2000_3000pg/mL"

      - hour: "early_morning (0600_0700)"
        event: "Melatonin decline, cortisol_rise (CAR)"
        mechanism: "light_exposure_→_melatonin_suppression; CRH_activation"

    requirements:
      - serotonin_availability: "requires_tryptophan_adequate_diet"
      - darkness: "blue_light_suppresses_melatonin_synthesis"
      - temperature: "core_body_temp_decrease_facilitates_sleep"
      - adenosine: "accumulates_throughout_day"

    disruption_factors:
      - blue_light_evening: "screens_suppress_melatonin"
      - high_cortisol_evening: "stress_prevents_melatonin_rise"
      - poor_serotonin: "low_tryptophan → melatonin_cannot_be_synthesized"
      - caffeine_afternoon: "adenosine_blocks → reduced_sleep_pressure"

    recovery_timeline_nights: 3_5

  sleep_architecture_nrem_rem:
    name: "Sleep Architecture (NREM and REM Sleep Cycles)"
    de_name: "Schlafarchitektur (NREM und REM)"
    description: "Cycling between NREM (restorative) and REM (memory/emotion processing)"
    category: "sleep"

    nrem_sleep:
      description: "Non-rapid eye movement sleep (deep, restorative)"
      stages:
        - stage: "N1"
          duration_minutes: 5_10
          characteristics: "light_sleep, easy_to_wake"

        - stage: "N2"
          duration_minutes: 10_25
          characteristics: "deeper_sleep, sleep_spindles, K_complexes"

        - stage: "N3_SWS"
          duration_minutes: 20_40
          name: "Slow-Wave Sleep"
          characteristics: "deepest_sleep, delta_waves"
          functions:
            - "growth_hormone_secretion → muscle_repair"
            - "metabolic_consolidation"
            - "glymphatic_clearance (adenosine_removal, brain_waste_clearance)"
            - "emotional_regulation"

      total_per_night: "60_70% of total sleep"

    rem_sleep:
      description: "Rapid eye movement sleep (emotional, memory processing)"
      duration_minutes: 20_30
      characteristics: "rapid_eye_movements, muscle_atonia, vivid_dreams"
      functions:
        - "emotional_memory_consolidation"
        - "amygdala_processing (anxiety_extinction)"
        - "creative_problem_solving"
        - "brain_development (critical_in_infants)"
      total_per_night: "20_25% of total sleep"

    cycle_structure:
      "cycle_1": "~90min (N1→N2→N3→REM)"
      "cycle_2": "~90min (more_REM_less_N3)"
      "cycle_3": "~90min (more_REM_less_N3)"
      "cycle_4": "~90min (mostly_N2_REM)"
      "typical_night": "4_6_cycles"

    disruption_consequences:
      shortened_sleep: "reduced_SWS → impaired_growth_hormone → poor_muscle_recovery"
      rem_suppression: "THC, alcohol, benzodiazepines → REM_rebound_upon_cessation"
      fragmentation: "cortisol_dysregulation, stress_fragmentation_→_reduced_SWS"

    optimization: "consistent_sleep_schedule, cool_dark_room, adequate_adenosine_accumulation"

  exercise_cortisol_dopamine_endorphin:
    name: "Exercise Stress Response and Adaptations"
    de_name: "Trainingsstress und Anpassungen"
    description: "Controlled stress response to exercise → beneficial adaptations"
    category: "exercise_physiology"

    timeline:
      - minutes: "0_5"
        event: "Exercise start"
        mechanism: "motor_cortex → sympathetic_activation"
        cortisol: "light_elevation"
        dopamine: "increase"

      - minutes: "5_30"
        event: "Sustained exercise"
        mechanism: "ATP_depletion → energy_mobilization"
        cortisol: "progressive_elevation"
        glucose_mobilization: "increased"
        adrenaline: "elevated"

      - minutes: "15_40"
        event: "Endorphin release"
        mechanism: "prolonged_exercise (>20min) → endogenous_opioid_activation"
        endorphins: "peak"
        pain_sensation: "decreased (analgesic)"
        mood: "elevation"

      - minutes: "30_post"
        event: "Cortisol peak"
        mechanism: "HPA_axis_peak_response_post_exercise"
        cortisol: "maximum"

      - hours: "1_3_post"
        event: "Recovery and adaptation signals"
        mechanism: "cortisol_decline, dopamine_sustained, growth_hormone_spike"
        growth_hormone: "elevated"
        muscle_protein_synthesis: "increased"
        mood: "sustained_elevation"

    adaptations_with_training:
      "2_3_weeks": "increased_dopamine_response, reduced_cortisol_per_workout"
      "4_8_weeks": "enhanced_endorphin_sensitivity, improved_mood_resilience"
      "8_12_weeks": "baseline_cortisol_decrease, HPA_axis_efficiency_increase"

    optimal_timing:
      for_sleep: "morning_or_early_afternoon (avoid_evening; evening_cortisol → delayed_sleep)"
      for_adenosine: "exercise → ATP_depletion → adenosine_accumulation → enhanced_sleep_pressure"

    post_exercise_sleep:
      effect: "1_3_nights_post_intense_exercise_show_increased_slow_wave_sleep"
      benefit: "growth_hormone_secretion_in_SWS → enhanced_muscle_repair"
      mechanism: "adenosine_elevation_20_30%_over_24h"

  dopamine_reward_to_habit_formation:
    name: "Dopamine Reward Learning and Habit Formation"
    de_name: "Dopamin-Lernkaskade und Habitusbildung"
    description: "Transition from novelty-driven dopamine to cue-driven habitual behavior"
    category: "motivation_learning"

    phase_1_novelty_reward:
      timeline: "initial_encounter"
      dopamine_pattern: "dopamine_spike_at_REWARD (prediction_error)"
      attention: "heightened_to_reward_context"
      brain_region: "ventral_tegmental_area → nucleus_accumbens"
      psychology: "pleasurable, novel, salient"

    phase_2_cue_learning:
      timeline: "repeated_reward"
      dopamine_shift: "dopamine_spike_shifts_from_reward_to_cue"
      mechanism: "reward_prediction_error_decreases → dopamine_anticipatory"
      dopamine_at_reward: "dips_if_expected_reward_absent (disappointment)"
      motivation: "cue_→_reward_association_strengthens"

    phase_3_habit_formation:
      timeline: "weeks_months_of_repetition"
      dopamine_role: "motivates_approach_to_cue (not_pleasure)"
      brain_shift: "activation_shifts_from_ventromedial_prefrontal → dorsolateral_striatum"
      behavior: "automatic, semi_conscious, triggered_by_cue"
      awareness: "reduced_goal_representation"
      psychology: "habitual, not_necessarily_enjoyable"

    addiction_pathology:
      mechanism: "misalignment_of_reward_systems"
      example: "social_media_notification_cue → dopamine_spike → compulsive_checking (no_pleasure)"
      consequence: "tolerance, escalation, loss_of_pleasure"

    dopamine_reset:
      timeline: "days_to_weeks_of_abstinence"
      mechanism: "dopamine_receptor_recovery, reward_sensitization_return"
      recommendation: "avoid_cue_stimulus_days → normalization_of_dopamine_sensitivity"

  serotonin_tryptophan_cascade:
    name: "Serotonin Synthesis and Regulation"
    de_name: "Serotonin-Synthese-Kaskade"
    description: "Tryptophan → serotonin; factors affecting serotonin availability"
    category: "neurotransmitter_synthesis"

    synthesis_pathway:
      - step: 1
        substrate: "dietary_tryptophan"
        enzyme: "tryptophan_hydroxylase"
        cofactors: [vitamin_b6, iron, ascorbic_acid]
        product: "5_hydroxytryptophan (5_HTP)"
        location: "raphe_nuclei (brainstem)"

      - step: 2
        substrate: "5_HTP"
        enzyme: "aromatic_amino_acid_decarboxylase (AADC)"
        cofactors: [vitamin_b6, magnesium]
        product: "serotonin"

      - step: 3
        process: "storage_and_reuptake"
        mechanism: "serotonin_stored_in_vesicles; reuptake_via_SERT"
        notes: "SSRIs_block_SERT → increased_synaptic_serotonin"

    factors_affecting_serotonin_synthesis:
      tryptophan_availability:
        - "dietary_intake (turkey, chicken, cheese, nuts)"
        - "insulin_levels (carbs_enhance_tryptophan_BBB_transport)"
        - "compete_with_branched_chain_amino_acids (LNAA_effect)"

      cofactor_availability:
        - "vitamin_B6_pyridoxine (critical)"
        - "magnesium (essential)"
        - "iron"
        - "ascorbic_acid (vitamin_C)"

      circadian_factors:
        - "higher_serotonin_synthesis_afternoon_evening"
        - "light_exposure (morning_light → daytime_serotonin)"

      stress_and_disease:
        - "chronic_stress → tryptophan_depletion (via_kynurenine_pathway)"
        - "inflammation → tryptophan_→_kynurenine (not_serotonin)"
        - "depression_↔_serotonin_dysregulation (bidirectional)"

    optimal_timing_for_elevation:
      recommendation: "evening_tryptophan_with_carbs (enhances_BBB_transport)"
      mechanism: "carbs_↑_insulin → ↑_LNAA_clearance → ↑_tryptophan_relative_BBB_transport"
      timeline: "4_6h_post_ingestion_for_serotonin_effects"

  inflammation_depression_psychoneuroimmune:
    name: "Inflammation-Depression Cascade (Psychoneuroimmunology)"
    de_name: "Entzündungs-Depressions-Kaskade"
    description: "Chronic inflammation → serotonin depletion → depression phenotype"
    category: "psychoneuroimmunity"

    pathway_1_cytokine_hpa:
      trigger: "chronic_stress, infection, poor_diet"
      mechanism: "IL_6, TNF_α → hypothalamus"
      consequence: "HPA_axis_overactivation, serotonin_depletion"
      marker: "elevated_CRP, IL_6, TNF_α"

    pathway_2_tryptophan_depletion:
      mechanism: "TNF_α, IFN_γ → activate_indoleamine_2,3_dioxygenase (IDO)"
      enzyme_action: "tryptophan_→_kynurenine (inflammatory_pathway, not_serotonin)"
      consequence: "reduced_serotonin_synthesis"
      effect_on_mood: "dysphoria, anhedonia, cognitive_impairment"

    pathway_3_microglia_activation:
      mechanism: "IL_6_→_microglia → neuroinflammation"
      location: "brain"
      consequence: "reduced_neurogenesis (dentate_gyrus), impaired_memory"

    depression_phenotype_inflammatory:
      characteristics:
        - "treatment_resistant (40_50%_of_depressed_with_elevated_CRP_poor_SSRI_response)"
        - "greater_anhedonia"
        - "psychomotor_slowing"
        - "associated_with_autoimmune_and_medical_illness"

      biomarkers: "CRP>3mg/L, IL_6>4pg/mL, TNF_α>2pg/mL"

    recovery_interventions:
      - "exercise (↑_IL_10_anti_inflammatory)"
      - "adequate_sleep (immune_recovery)"
      - "omega_3_supplementation (↓_TNF_α)"
      - "social_support (↑_oxytocin → vagal_↑_IL_10)"
      - "stress_reduction (↓_cortisol → HPA_normalization)"

    recovery_timeline: "4_8_weeks_consistent_lifestyle_changes"

  fasting_ketogenesis_neuroprotection:
    name: "Fasting and Ketogenesis for Neuroprotection"
    de_name: "Fasten und Ketogenese für Neuroprotection"
    description: "Metabolic shift from glucose to ketones; anti-inflammatory and neuroprotective effects"
    category: "metabolic_resilience"

    fasting_timeline:
      - hours: "0_2"
        state: "fed"
        fuel: "glucose_oxidation"

      - hours: "2_4"
        state: "post_absorptive"
        mechanism: "hepatic_glycogen_depletion"
        fuel: "mixture_glucose_fatty_acids"

      - hours: "4_8"
        state: "early_fasting"
        mechanism: "hepatic_ketogenesis_begins"
        ketones: "0.1_0.5mM (threshold_level)"

      - hours: "12_16"
        state: "nutritional_ketosis"
        ketones: "0.5_1.0mM"
        fuel: "~70%_ketones, ~30%_glucose"

      - hours: "24_48"
        state: "therapeutic_ketosis"
        ketones: "1.0_5.0mM"
        fuel: "~80%_ketones"

    ketone_mechanisms:
      - mechanism: "Efficient_brain_fuel"
        action: "ketones_provide_15_20%_more_ATP_per_oxygen_than_glucose"
        benefit: "improved_efficiency, reduced_metabolic_demand"

      - mechanism: "HDAC_inhibition"
        action: "ketones → HDAC_inhibition (histone_deacetylase)"
        consequence: "↑_chromatin_accessibility → ↑_GABA_synthesis_genes"
        effect: "enhanced_GABA_production"

      - mechanism: "Inflammasome_suppression"
        action: "ketones → NLRP3_inflammasome_inhibition"
        consequence: "↓_IL_1β, ↓_IL_18 (pro_inflammatory_cytokines)"
        effect: "reduced_neuroinflammation, reduced_seizure_threshold"

      - mechanism: "Mitochondrial_biogenesis"
        action: "ketones → enhanced_mitochondrial_function"
        benefit: "improved_energy_production, antioxidant_capacity"

    practical_application:
      "intermittent_fasting_16:8": "daily_8h_eating_window, 16h_fasting"
      "timing": "example: 1200_2000 eating, 2000_1200_next_fasting"
      "sustained_ketosis": "mild_ketosis_0.5_1.0mM_maintained"
      "cognitive_effects": "improved_mood, reduced_brain_fog, enhanced_focus"

    timeline_to_adaptation:
      "3_5_days": "keto_flu (transient_fatigue, headache)"
      "1_2_weeks": "metabolic_adaptation, increased_ketone_utilization"
      "4_8_weeks": "optimized_fat_oxidation, reduced_hunger"

  stress_response_allostatic_load:
    name: "Stress Response Progression: Acute to Chronic to Burnout"
    de_name: "Stressreaktion: akut zu chronisch zu Burnout"
    description: "Temporal progression of stress response; adaptive to maladaptive"
    category: "stress_physiology"

    acute_stress_hours_to_days:
      timeline: "0_72h"
      hpa_activation: "appropriate, short_lived"
      cortisol_pattern:
        - rise: "rapid_elevation (15_20min)"
        - peak: "elevated_then_normalized (4_6h)"
      hormonal_effects:
        - glucose_mobilization: "hepatic_glycogenolysis → ↑_blood_glucose"
        - adrenaline: "sympathetic_activation"
        - immune: "adaptive_mobilization (innate_response)"
      psychology: "alert, focused, energized"
      recovery: "24_72h_full_recovery_with_rest"
      benefit: "eustress, performance_enhancement (Yerkes_Dodson_curve)"

    chronic_stress_weeks_to_months:
      timeline: "weeks_months"
      hpa_dysregulation: "develops_over_weeks"
      cortisol_pattern:
        - day: "flattened_rhythm (elevated_baseline, reduced_CAR)"
        - night: "cortisol_fails_to_decline → sleep_disruption"
      hormonal_effects:
        - inflammation: "↑_IL_6, ↑_TNF_α, ↑_CRP (sustained)"
        - sleep: "↓_melatonin, ↑_cortisol_evening → disrupted_architecture"
        - metabolism: "↑_insulin_resistance, ↓_HGH"
        - immune: "shift_TH1→TH2 (immunosuppression)"
      psychology: "anxiety_first, depression_follows, emotional_dysregulation"
      mood: "anhedonia, irritability, reduced_motivation"

    allostatic_load_accumulation_months_years:
      definition: "wear_and_tear from chronic_stress_and_dysregulation"
      markers:
        - cortisol: "chronically_elevated_resting, flattened_rhythm"
        - dhea: "↓_dehydroepiandrosterone (cortisol/DHEA_ratio_↑)"
        - immune: "immunosuppression, ↑_infection_susceptibility"
        - metabolic: "metabolic_syndrome, insulin_resistance, obesity_risk"
      health_consequences:
        - cardiovascular: "hypertension, atherosclerosis, increased_MI_risk"
        - brain: "hippocampal_atrophy (memory_impairment), prefrontal_dysregulation"
        - aging: "premature_cellular_aging, shortened_telomeres"
        - disease: "autoimmune_activation, cancer_risk_increase"
      psychological: "burnout (exhaustion, cynicism, reduced_efficacy)"
      timeline_to_disease: "5_10_years_chronic_stress → measurable_health_consequences"

    recovery_timeline:
      acute_stress: "24_48h_rest_→_recovery"
      chronic_stress: "2_4_weeks_intensive_lifestyle_reset"
      allostatic_load: "3_6_months_consistent_stress_reduction_needed"

    intervention_hierarchy:
      priority_1: "sleep_first (↓_cortisol, ↑_immune, ↓_inflammation)"
      priority_2: "exercise_second (↑_dopamine, ↓_inflammation, ↑_HGH)"
      priority_3: "social_connection_third (↑_oxytocin, vagal_tone)"
      priority_4: "relaxation_daily (meditation, breathwork, massage)"
      priority_5: "nutrition_optimization (anti_inflammatory, nutrient_dense)"

  vagal_tone_heart_rate_variability:
    name: "Vagal Tone and Autonomic Nervous System Balance"
    de_name: "Vagale Tonus und ANS-Balance"
    description: "Vagal tone as marker and modulator of stress resilience and health"
    category: "autonomic_nervous_system"

    physiological_basis:
      vagus_nerve: "primary_parasympathetic_trunk (CN_X)"
      innervation: "heart, lungs, GI_tract, pharynx, larynx"
      primary_neurotransmitter: "acetylcholine (parasympathomimetic)"
      measurement: "heart_rate_variability (HRV) = variation_between_heartbeats"

    hrv_interpretation:
      high_hrv:
        range_ms: ">50ms"
        physiology: "high_parasympathetic_tone, low_sympathetic_dominance"
        psychology: "calm, resilient, emotionally_flexible"
        health: "better_cardiovascular_health, longer_lifespan"

      moderate_hrv:
        range_ms: "20_50ms"
        physiology: "balanced_ANS"
        psychology: "normal_stress_response"

      low_hrv:
        range_ms: "<20ms"
        physiology: "low_vagal_tone, sympathetic_dominance"
        psychology: "stressed, anxious, poor_emotional_regulation"
        health: "increased_cardiovascular_disease_risk, inflammation_marker"
        associated_with: "depression, anxiety, burnout, PTSD"

    vagal_enhancers_rapid_implementation:
      - technique: "slow_breathing"
        method: "5_4_5_pattern (breathe_in_5s, hold_4s, exhale_5s); 4_7_8_pattern"
        effect: "HRV_↑_immediate (5_10min)"
        mechanism: "long_exhales_activate_parasympathetic"

      - technique: "cold_face_immersion"
        method: "15_30s_face_submersion_in_cold_water"
        effect: "vagal_bradycardia (heart_rate_drop)"
        mechanism: "trigeminal_reflex → parasympathetic_activation"

      - technique: "gargling"
        method: "vigorous_gargling_30_60s"
        effect: "vagus_nerve_muscle_strengthening"
        mechanism: "vagus_innervates_pharyngeal_muscles"

      - technique: "singing_chanting"
        method: "sustained_vocalization (humming, singing)"
        effect: "vagal_stimulation"
        mechanism: "vocal_cord_manipulation → vagal_efferents"

      - technique: "neck_massage"
        method: "gentle_massage_of_neck/carotid_sinus_10_15s"
        effect: "baroreceptor_feedback → vagal_tone"
        mechanism: "mechanoreceptor_input"

      - technique: "social_engagement"
        method: "genuine_conversation, eye_contact, touch"
        effect: "ventral_vagal_activation (social_engagement_system)"
        mechanism: "polyvagal_theory (ventral_vs_dorsal_vagal)"

    timeline_to_improvement:
      "acute_effect": "5_10min_per_technique"
      "daily_practice": "1_2_weeks_measurable_HRV_improvement"
      "sustained_practice": "4_8_weeks_baseline_HRV_↑, stress_resilience_improved"

  oxytocin_stress_buffering:
    name: "Oxytocin Stress Buffering and Social Regulation of the HPA Axis"
    de_name: "Oxytozin-Stressabbau durch soziale Unterstützung"
    description: "Social connection and touch → oxytocin → HPA axis suppression → stress resilience"
    category: "social_physiology"

    pathway:
      - trigger: "social_connection_or_touch"
        mechanism: "skin_mechanoreceptors → vagal_afferents → oxytocin_release"
        location: "posterior_pituitary"

      - oxytocin_action: "oxytocin → paraventricular_nucleus (PVN)"
        mechanism: "oxytocin_inhibits_CRH → cortisol_suppression"
        consequence: "↓_cortisol (20_30%_reduction)"

      - oxytocin_amygdala: "oxytocin → amygdala"
        mechanism: "fear_extinction, threat_appraisal_reduction"
        effect: "anxiety_↓"

      - result: "stress_response_buffered_if_social_support_present"

    oxytocin_triggers:
      - physical_touch: "hug_20s → oxytocin_peak"
