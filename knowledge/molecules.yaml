molecules:
  caffeine:
    name: Caffeine
    de_name: Koffein
    category: alkaloid
    formula: C8H10N4O2
    sources:
      external:
        - coffee
        - tea
        - dark_chocolate
        - energy_drinks
    functions:
      - Adenosine receptor antagonist
      - Increases wakefulness
      - Enhances dopamine signaling
    primary_effects:
      dopamine:
        direction: increase
        magnitude: "30"
        onset_minutes: 15
        peak_minutes: 45
        duration_minutes: 300
        mechanism: A1/A2a receptor antagonism → reduced inhibition
      cortisol:
        direction: increase
        magnitude: "25"
        onset_minutes: 30
        peak_minutes: 90
        duration_minutes: 240
        mechanism: sympathetic nervous system activation
    affects:
      - dopamine
      - cortisol
      - adrenaline
      - adenosine_receptors
    relaxation_relevance: high_negative
  nicotine:
    name: Nicotine
    de_name: Nikotin
    category: alkaloid
    formula: C10H14N2
    sources:
      external:
        - tobacco
        - cigarettes
        - nicotine_patches
    functions:
      - nAChR agonist (nicotinic acetylcholine receptor)
      - Increases dopamine and noradrenaline
      - Enhances focus and alertness
    primary_effects:
      dopamine:
        direction: increase
        magnitude: "35"
        onset_minutes: 10
        peak_minutes: 20
        duration_minutes: 120
        mechanism: direct nAChR activation on VTA dopamine neurons
      cortisol:
        direction: increase
        magnitude: "20"
        onset_minutes: 15
      noradrenaline:
        direction: increase
        magnitude: "40"
    affects:
      - dopamine
      - cortisol
      - noradrenaline
      - heart_rate
    relaxation_relevance: high_negative
    notes: Rapid tolerance development (hours to days)
  thc:
    name: Δ9-Tetrahydrocannabinol
    de_name: THC
    category: phytocannabinoid
    formula: C21H30O2
    sources:
      external:
        - cannabis
        - marijuana
    functions:
      - CB1 and CB2 receptor agonist
      - Produces reward pathway activation
      - Anxiolytic and analgesic
    primary_effects:
      dopamine:
        direction: increase
        magnitude: "25"
        onset_minutes: 15
        peak_minutes: 60
        duration_minutes: 240
        mechanism: CB1 activation → disinhibition of dopamine
      anxiety:
        direction: variable
        notes: "biphasic: anxiolytic low-dose, anxiogenic high-dose"
      cortisol:
        direction: variable
        notes: stress-dependent
    affects:
      - dopamine
      - GABA
      - glutamate
      - pain_perception
    relaxation_relevance: moderate_positive
    notes: CB1 tolerance develops 3-7 days with heavy use
  cbd:
    name: Cannabidiol
    de_name: CBD
    category: phytocannabinoid
    formula: C21H30O2
    sources:
      external:
        - cannabis
        - hemp_oil
    functions:
      - 5-HT1A receptor agonist (serotonergic)
      - TRPV1 agonist
      - Anti-inflammatory
    primary_effects:
      anxiety:
        direction: decrease
        magnitude: "40"
        optimal_dose_mg: 200_300
        dose_response: inverted_U (biphasic)
        mechanism: 5-HT1A + adenosine A2A enhancement
      inflammation:
        direction: decrease
        mechanism: NLRP3 inflammasome inhibition
    affects:
      - anxiety
      - pain
      - inflammation
      - sleep
    relaxation_relevance: high_positive
    notes: No tolerance development (unlike THC)
  serotonin:
    name: Serotonin
    de_name: Serotonin
    category: neurotransmitter
    formula: C10H12N2O
    produces_from:
      - tryptophan
      - l_tryptophan
    functions:
      - Mood regulation
      - Sleep onset (via melatonin synthesis)
      - Appetite suppression
      - GI motility
    primary_effects:
      mood:
        direction: increase
        magnitude: mood_elevation
      sleep:
        direction: improve
        mechanism: evening elevation → melatonin synthesis
    affects:
      - melatonin
      - mood
      - appetite
      - sleep
    relaxation_relevance: high_positive
    notes: "Precursor availability critical: tryptophan + vitamin B6 + carbs"
  dopamine:
    name: Dopamine
    de_name: Dopamin
    category: neurotransmitter
    formula: C8H11NO2
    produces_from:
      - tyrosine
      - l_dopa
    functions:
      - Motivation and reward
      - Motor control
      - Attention and focus
      - Pleasure (acute only)
    primary_effects:
      motivation:
        direction: increase
        magnitude: reward_driven_behavior
      focus:
        direction: increase
    affects:
      - motivation
      - mood
      - focus
      - habit_formation
    relaxation_relevance: neutral
    notes: Dopamine shifts from reward to cue in habit formation
  gaba:
    name: Gamma-Aminobutyric Acid
    de_name: GABA
    category: neurotransmitter
    formula: C4H9NO2
    produces_from:
      - glutamate
      - vitamin_b6
    functions:
      - Primary inhibitory neurotransmitter
      - Reduces neuronal excitability
      - Anxiolytic
    primary_effects:
      anxiety:
        direction: decrease
        magnitude: anxiety_reduction
      muscle_tension:
        direction: decrease
      sleep:
        direction: improve
        mechanism: reduces wakefulness-promoting activity
    affects:
      - anxiety
      - sleep
      - muscle_tension
    relaxation_relevance: high_positive
    notes: Requires magnesium for optimal GABA receptor function
  acetylcholine:
    name: Acetylcholine
    de_name: Acetylcholin
    category: neurotransmitter
    formula: C7H16NO2
    produces_from:
      - choline
      - acetyl_coa
    functions:
      - Primary parasympathetic neurotransmitter
      - Memory formation
      - REM sleep regulation
    primary_effects:
      parasympathetic_tone:
        direction: increase
        magnitude: rest_and_digest_mode
      heart_rate:
        direction: decrease
      digestion:
        direction: increase
    affects:
      - heart_rate
      - digestion
      - sleep
      - memory
    relaxation_relevance: high_positive
    notes: Vagus nerve primary pathway
  noradrenaline:
    name: Noradrenaline
    de_name: Noradrenalin
    category: neurotransmitter
    formula: C8H11NO3
    produces_from:
      - dopamine
      - tyrosine
    functions:
      - Sympathetic activation
      - Attention and alertness
      - Blood pressure regulation
    primary_effects:
      alertness:
        direction: increase
        magnitude: increased_attention
      heart_rate:
        direction: increase
      blood_pressure:
        direction: increase
    affects:
      - heart_rate
      - blood_pressure
      - alertness
      - anxiety
    relaxation_relevance: high_negative
  melatonin:
    name: Melatonin
    de_name: Melatonin
    category: hormone
    formula: C13H16N2O2
    produces_from:
      - serotonin
    functions:
      - Sleep-wake cycle regulation
      - Circadian rhythm synchronization
      - Antioxidant
    primary_effects:
      sleep_onset:
        direction: improve
        magnitude: latency_reduction
        mechanism: suppression of wakefulness signals
      circadian_alignment:
        direction: improve
        notes: light-dependent synthesis
    affects:
      - sleep
      - circadian_rhythm
      - antioxidant_defense
    relaxation_relevance: high_positive
    notes: Synthesis requires evening darkness + serotonin availability
  adenosine:
    name: Adenosine
    de_name: Adenosin
    category: nucleoside
    formula: C10H13N5O4
    functions:
      - Sleep pressure signal
      - Metabolic byproduct (ATP depletion)
      - Anti-inflammatory
    primary_effects:
      sleep_pressure:
        direction: increase
        magnitude: accumulates_during_wakefulness
        mechanism: binds A1 receptors on sleep-promoting basal forebrain
      inflammation:
        direction: decrease
        mechanism: A2a receptor activation → anti-inflammatory
    affected_by:
      - caffeine
    affects:
      - sleep
      - inflammation
    relaxation_relevance: high_positive
    notes: Caffeine blocks adenosine signal → mask sleep pressure
  cortisol:
    name: Cortisol
    de_name: Kortisol
    category: hormone
    formula: C21H30O5
    produces_from:
      - cholesterol
    functions:
      - Stress response hormone
      - Energy mobilization
      - Immune regulation
      - Anti-inflammatory (chronically suppressive)
    primary_effects:
      glucose:
        direction: increase
        magnitude: mobilizes_glucose (hepatic_glycogenolysis)
      blood_pressure:
        direction: increase
      immune:
        direction: biphasic
        acute: enhanced (adaptive)
        chronic: suppressed (TH1→TH2_shift)
      mood:
        direction: variable
        acute: increased_alertness
        chronic: anxiety_depression
    circadian_rhythm:
      peak: morning (CAR)
      nadir: midnight
      suppression: evening (should_decrease_for_sleep)
    affects:
      - glucose
      - blood_pressure
      - immune_function
      - mood
      - sleep
    relaxation_relevance: high_negative
    notes: Chronic elevation associated with burnout, immune suppression
  adrenaline:
    name: Epinephrine
    de_name: Adrenalin
    category: hormone
    formula: C9H13NO3
    produces_from:
      - noradrenaline
    functions:
      - Acute stress response
      - Fight-or-flight activation
      - Emergency energy mobilization
    primary_effects:
      heart_rate:
        direction: increase
        magnitude: immediate
      blood_glucose:
        direction: increase
      breathing:
        direction: increase
      attention:
        direction: narrow_focus
    affects:
      - heart_rate
      - glucose
      - breathing
      - focus
    relaxation_relevance: high_negative
    notes: Peak within minutes, subsides after stressor removal
  crh:
    name: Corticotropin-Releasing Hormone
    de_name: CRH
    category: hormone
    formula: C6H15N3O12
    location: hypothalamus
    functions:
      - Initiates HPA axis cascade
      - Stress response trigger
    primary_effects:
      hpa_cascade:
